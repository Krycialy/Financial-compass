services:
  - type: web
    name: financial-compass
    env: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /index.php
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: DB_NAME
        sync: false